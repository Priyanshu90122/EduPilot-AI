version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: edupilot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edupilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edupilot_pass}
      POSTGRES_DB: ${POSTGRES_DB:-edupilot_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edupilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: edupilot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: edupilot_backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - storage:/app/storage
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    container_name: edupilot_celery_worker
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
      - storage:/app/storage
    command: celery -A app.celery_app worker -l info

  celery_beat:
    build: ./backend
    container_name: edupilot_celery_beat
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
      - storage:/app/storage
    command: celery -A app.celery_app beat -l info

  flower:
    build: ./backend
    container_name: edupilot_flower
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      - redis
    ports:
      - "5555:5555"
    command: celery -A app.celery_app flower --port=5555

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    container_name: edupilot_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  storage:
